<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일품수학전문_수학시험지제출</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f3f6ff;
      color: #212433;
    }

    .app {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 14px 12px 20px;
    }

    .card {
      background: #fff;
      border: 1px solid #e4e9f5;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 8px 18px rgba(34, 51, 84, 0.08);
      margin-bottom: 12px;
    }

    .top-exit {
      position: fixed;
      top: 10px;
      right: 10px;
      width: auto;
      padding: 8px 12px;
      border-radius: 8px;
      border: 0;
      background: #e53935;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      z-index: 1200;
    }

    .top-exit:hover {
      background: #c62828;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      text-align: center;
    }

    .top-note {
      margin: 0;
      font-size: 12px;
      text-align: center;
      color: #66708b;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-top: 10px;
    }

    .tab-btn {
      border: 1px solid #d6dcef;
      background: #eef2ff;
      color: #33406d;
      border-radius: 10px;
      padding: 9px 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #4a77ff;
      border-color: #4a77ff;
      color: #fff;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    h2 {
      margin: 4px 0 10px;
      font-size: 18px;
    }

    .form-row {
      margin-bottom: 8px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      font-weight: 700;
      color: #394053;
    }

    input {
      width: 100%;
      border: 1px solid #d6dceb;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #4a77ff;
      box-shadow: 0 0 0 2px rgba(74, 119, 255, 0.15);
    }

    .help {
      margin: 3px 0 0;
      font-size: 11px;
      color: #68708a;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 9px;
      padding: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: #4a77ff;
      color: #fff;
    }

    .btn-primary:hover {
      background: #365fdb;
    }

    .btn-edit {
      width: auto;
      padding: 6px 10px;
      border-radius: 7px;
      background: #fff0dd;
      color: #8f4f00;
      font-size: 12px;
    }

    .post-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .post-item {
      border: 1px solid #e4e9f5;
      border-radius: 10px;
      background: #fcfdff;
      padding: 10px;
    }

    .post-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .post-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      word-break: break-word;
    }

    .post-score {
      margin: 7px 0 0;
      font-size: 12px;
      color: #5f6882;
    }

    .empty {
      margin: 0;
      color: #6a7285;
      font-size: 13px;
    }

    .admin-lock {
      margin: 0 0 10px;
      padding: 9px;
      border-radius: 8px;
      background: #fff4e6;
      color: #8a4e00;
      font-size: 13px;
      text-align: center;
      font-weight: 700;
    }

    .admin-info {
      margin: 0 0 8px;
      font-size: 13px;
      color: #5f6882;
    }

    .admin-post {
      border: 1px solid #e4e9f5;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fcfdff;
    }

    .admin-title {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .admin-detail {
      margin: 0;
      font-size: 13px;
      color: #2e3447;
    }

    .photo-grid {
      margin-top: 7px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .photo-grid img {
      width: 100%;
      height: 82px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #dde4f3;
    }

    .btn-exit {
      background: #2f3448;
      color: #fff;
    }

    .btn-exit:hover {
      background: #1f2435;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 999;
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 500px;
      position: relative;
    }

    .modal-image {
      width: 100%;
      max-height: 70vh;
      object-fit: contain;
      border-radius: 12px;
      background: #111;
    }

    .modal-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      color: #222;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
    }

    .modal-prev {
      left: -8px;
    }

    .modal-next {
      right: -8px;
    }

    .modal-close {
      position: absolute;
      top: -38px;
      right: 0;
      border: 0;
      border-radius: 8px;
      background: #fff;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <button id="exitBtn" type="button" class="top-exit">종료</button>
  <div class="app">
    <div class="card">
      <h1>일품수학전문_수학시험지제출</h1>
      <p class="top-note">작성 / 목록 / 관리자 3개 영역</p>
      <div class="tabs">
        <button type="button" class="tab-btn active" data-tab="writeSection">작성</button>
        <button type="button" class="tab-btn" data-tab="listSection">목록</button>
        <button type="button" class="tab-btn" data-tab="adminSection">관리자</button>
      </div>
    </div>

    <section id="writeSection" class="section active card">
      <h2>작성 페이지</h2>
      <form id="postForm">
        <div class="form-row">
          <label for="nameInput">이름</label>
          <input id="nameInput" maxlength="20" required />
        </div>
        <div class="form-row">
          <label for="schoolInput">학교</label>
          <input id="schoolInput" maxlength="40" required />
        </div>
        <div class="form-row">
          <label for="gradeInput">학년</label>
          <input id="gradeInput" maxlength="10" placeholder="예: 2학년" required />
        </div>
        <div class="form-row">
          <label for="objectiveScoreInput">객관식 점수</label>
          <input id="objectiveScoreInput" type="number" min="0" max="100" required />
        </div>
        <div class="form-row">
          <label for="subjectiveScoreInput">주관식 점수</label>
          <input id="subjectiveScoreInput" type="number" min="0" max="100" required />
        </div>
        <div class="form-row">
          <label for="totalScoreInput">총 점수(예상)</label>
          <input id="totalScoreInput" type="number" min="0" max="200" required />
        </div>
        <div class="form-row">
          <label for="photoInput">사진 업로드 (최대 5장)</label>
          <input id="photoInput" type="file" accept="image/*" multiple />
          <p class="help">수정할 때 새 사진을 고르면 기존 사진은 바뀝니다.</p>
        </div>
        <div class="form-row">
          <label for="postPasswordInput">개별 암호 (수정할 때 필요)</label>
          <input id="postPasswordInput" type="password" maxlength="20" required />
        </div>
        <button id="submitBtn" type="submit" class="btn btn-primary">등록하기</button>
      </form>
    </section>

    <section id="listSection" class="section card">
      <h2>목록 페이지</h2>
      <p id="emptyText" class="empty">아직 등록된 글이 없습니다.</p>
      <ul id="postList" class="post-list"></ul>
    </section>

    <section id="adminSection" class="section card">
      <h2>관리자 페이지</h2>
      <div id="adminLockBox">
        <p class="admin-lock">관리자 비밀번호를 입력해야 전체 정보와 사진을 볼 수 있습니다.</p>
        <div class="form-row">
          <label for="adminPasswordInput">관리자 비밀번호</label>
          <input id="adminPasswordInput" type="password" />
        </div>
        <button id="adminLoginBtn" type="button" class="btn btn-primary">관리자 로그인</button>
      </div>
      <div id="adminContent" style="display:none;">
        <p class="admin-info">관리자 로그인 성공! 전체 학생 정보를 확인할 수 있습니다.</p>
        <button id="adminLogoutBtn" type="button" class="btn" style="margin-bottom:8px;">로그아웃</button>
        <div id="adminList"></div>
      </div>
    </section>
  </div>

  <div id="photoModal" class="modal">
    <div class="modal-box">
      <button id="modalCloseBtn" class="modal-close" type="button">닫기</button>
      <button id="modalPrevBtn" class="modal-btn modal-prev" type="button">&#8249;</button>
      <img id="modalImage" class="modal-image" src="" alt="확대 사진" />
      <button id="modalNextBtn" class="modal-btn modal-next" type="button">&#8250;</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
    import {
      getFirestore,
      collection,
      addDoc,
      doc,
      updateDoc,
      onSnapshot,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import {
      getStorage,
      ref,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCIZyU64APdBL87NlY3xqwpL1jRmyp7RGI",
      authDomain: "myboard-d0cca.firebaseapp.com",
      projectId: "myboard-d0cca",
      storageBucket: "myboard-d0cca.firebasestorage.app",
      messagingSenderId: "816651953576",
      appId: "1:816651953576:web:cf433a0e4c103bfc91299d",
      measurementId: "G-SSNLHML40E"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const postsCollection = collection(db, "posts");

    try {
      getAnalytics(app);
    } catch (error) {
      console.warn("Analytics 초기화는 생략되었습니다.", error);
    }

    const ADMIN_PASSWORD = "a1111";

    const postForm = document.getElementById("postForm");
    const submitBtn = document.getElementById("submitBtn");
    const nameInput = document.getElementById("nameInput");
    const schoolInput = document.getElementById("schoolInput");
    const gradeInput = document.getElementById("gradeInput");
    const objectiveScoreInput = document.getElementById("objectiveScoreInput");
    const subjectiveScoreInput = document.getElementById("subjectiveScoreInput");
    const totalScoreInput = document.getElementById("totalScoreInput");
    const photoInput = document.getElementById("photoInput");
    const postPasswordInput = document.getElementById("postPasswordInput");

    const postList = document.getElementById("postList");
    const emptyText = document.getElementById("emptyText");

    const adminPasswordInput = document.getElementById("adminPasswordInput");
    const adminLoginBtn = document.getElementById("adminLoginBtn");
    const adminLogoutBtn = document.getElementById("adminLogoutBtn");
    const adminLockBox = document.getElementById("adminLockBox");
    const adminContent = document.getElementById("adminContent");
    const adminList = document.getElementById("adminList");

    const exitBtn = document.getElementById("exitBtn");

    const photoModal = document.getElementById("photoModal");
    const modalImage = document.getElementById("modalImage");
    const modalPrevBtn = document.getElementById("modalPrevBtn");
    const modalNextBtn = document.getElementById("modalNextBtn");
    const modalCloseBtn = document.getElementById("modalCloseBtn");

    const tabButtons = document.querySelectorAll(".tab-btn");
    const sections = document.querySelectorAll(".section");

    const posts = [];
    let editPostId = null;
    let isAdmin = false;

    let modalPhotos = [];
    let modalIndex = 0;

    function normalizePost(docData, docId) {
      return {
        id: docId,
        name: docData.name || "",
        school: docData.school || "",
        grade: docData.grade || "",
        objectiveScore: docData.objectiveScore || "",
        subjectiveScore: docData.subjectiveScore || "",
        totalScore: docData.totalScore || "",
        postPassword: docData.postPassword || "",
        photos: Array.isArray(docData.photos) ? docData.photos : []
      };
    }

    async function uploadPhotosToStorage(files) {
      const uploadFolder = "posts/" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
      const uploadTasks = files.map(async (file, index) => {
        const safeName = (file.name || ("photo-" + index)).replace(/[^a-zA-Z0-9._-]/g, "_");
        const filePath = uploadFolder + "/" + index + "-" + safeName;
        const fileRef = ref(storage, filePath);
        await uploadBytes(fileRef, file);
        return getDownloadURL(fileRef);
      });

      return Promise.all(uploadTasks);
    }

    function switchTab(targetId) {
      tabButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === targetId);
      });

      sections.forEach((section) => {
        section.classList.toggle("active", section.id === targetId);
      });
    }

    function updateListSection() {
      postList.innerHTML = "";
      emptyText.style.display = posts.length === 0 ? "block" : "none";

      posts.forEach((post) => {
        const item = document.createElement("li");
        item.className = "post-item";

        const head = document.createElement("div");
        head.className = "post-head";

        const title = document.createElement("p");
        title.className = "post-title";
        title.textContent = post.name + " / " + post.school + " / " + post.grade;

        const editBtn = document.createElement("button");
        editBtn.type = "button";
        editBtn.className = "btn btn-edit";
        editBtn.textContent = "수정하기";
        editBtn.addEventListener("click", () => requestEdit(post.id));

        const score = document.createElement("p");
        score.className = "post-score";
        score.textContent = "점수 정보는 관리자 페이지에서 확인";

        head.appendChild(title);
        head.appendChild(editBtn);
        item.appendChild(head);
        item.appendChild(score);
        postList.appendChild(item);
      });
    }

    function updateAdminSection() {
      if (!isAdmin) {
        adminLockBox.style.display = "block";
        adminContent.style.display = "none";
        return;
      }

      adminLockBox.style.display = "none";
      adminContent.style.display = "block";
      adminList.innerHTML = "";

      if (posts.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "등록된 글이 없습니다.";
        adminList.appendChild(empty);
        return;
      }

      posts.forEach((post) => {
        const box = document.createElement("div");
        box.className = "admin-post";

        const title = document.createElement("h3");
        title.className = "admin-title";
        title.textContent = post.name + " / " + post.school + " / " + post.grade;

        const detail = document.createElement("p");
        detail.className = "admin-detail";
        detail.textContent =
          "객관식: " + post.objectiveScore +
          "점 | 주관식: " + post.subjectiveScore +
          "점 | 총점(예상): " + post.totalScore + "점";

        box.appendChild(title);
        box.appendChild(detail);

        if (post.photos && post.photos.length > 0) {
          const grid = document.createElement("div");
          grid.className = "photo-grid";

          post.photos.forEach((photoUrl, photoIndex) => {
            const image = document.createElement("img");
            image.src = photoUrl;
            image.alt = "학생 사진";
            image.addEventListener("click", () => {
              openPhotoModal(post.photos, photoIndex);
            });
            grid.appendChild(image);
          });

          box.appendChild(grid);
        }

        adminList.appendChild(box);
      });
    }

    function requestEdit(postId) {
      const targetPost = posts.find((post) => post.id === postId);

      if (!targetPost) {
        return;
      }

      const password = prompt("수정 암호를 입력하세요.");

      if (password === null) {
        return;
      }

      if (password !== targetPost.postPassword) {
        alert("암호가 틀렸습니다.");
        return;
      }

      editPostId = targetPost.id;
      nameInput.value = targetPost.name;
      schoolInput.value = targetPost.school;
      gradeInput.value = targetPost.grade;
      objectiveScoreInput.value = targetPost.objectiveScore;
      subjectiveScoreInput.value = targetPost.subjectiveScore;
      totalScoreInput.value = targetPost.totalScore;
      postPasswordInput.value = targetPost.postPassword;
      submitBtn.textContent = "수정 완료";
      switchTab("writeSection");
      nameInput.focus();
    }

    function resetFormMode() {
      editPostId = null;
      submitBtn.textContent = "등록하기";
      postForm.reset();
    }

    async function handleFormSubmit(event) {
      event.preventDefault();

      const name = nameInput.value.trim();
      const school = schoolInput.value.trim();
      const grade = gradeInput.value.trim();
      const objectiveScore = objectiveScoreInput.value.trim();
      const subjectiveScore = subjectiveScoreInput.value.trim();
      const totalScore = totalScoreInput.value.trim();
      const postPassword = postPasswordInput.value.trim();
      const selectedFiles = Array.from(photoInput.files);

      if (!name || !school || !grade || !objectiveScore || !subjectiveScore || !totalScore || !postPassword) {
        alert("모든 칸을 입력해주세요.");
        return;
      }

      if (selectedFiles.length > 5) {
        alert("사진은 최대 5장까지만 업로드할 수 있습니다.");
        return;
      }

      let photoUrlList = [];

      try {
        if (selectedFiles.length > 0) {
          photoUrlList = await uploadPhotosToStorage(selectedFiles);
        }
      } catch (error) {
        console.error("Storage 업로드 실패:", error);
        alert("사진 업로드 중 오류가 발생했습니다.");
        return;
      }

      try {
        if (editPostId) {
          const before = posts.find((post) => post.id === editPostId);
          const oldPhotos = before && Array.isArray(before.photos) ? before.photos : [];

          await updateDoc(doc(db, "posts", editPostId), {
            name,
            school,
            grade,
            objectiveScore,
            subjectiveScore,
            totalScore,
            postPassword,
            photos: photoUrlList.length > 0 ? photoUrlList : oldPhotos,
            updatedAt: serverTimestamp()
          });
        } else {
          await addDoc(postsCollection, {
            name,
            school,
            grade,
            objectiveScore,
            subjectiveScore,
            totalScore,
            postPassword,
            photos: photoUrlList,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
        }
      } catch (error) {
        console.error("Firestore 저장 실패:", error);
        alert("저장 중 오류가 발생했습니다. Firestore 규칙을 확인해주세요.");
        return;
      }

      resetFormMode();
      switchTab("listSection");
    }

    function openPhotoModal(photoList, startIndex) {
      modalPhotos = photoList.slice();
      modalIndex = startIndex;
      renderModalPhoto();
      photoModal.classList.add("active");
    }

    function renderModalPhoto() {
      if (modalPhotos.length === 0) {
        return;
      }

      modalImage.src = modalPhotos[modalIndex];
      modalPrevBtn.style.display = modalPhotos.length > 1 ? "block" : "none";
      modalNextBtn.style.display = modalPhotos.length > 1 ? "block" : "none";
    }

    function closePhotoModal() {
      photoModal.classList.remove("active");
      modalPhotos = [];
      modalIndex = 0;
    }

    function showPrevPhoto() {
      if (modalPhotos.length === 0) {
        return;
      }

      modalIndex = (modalIndex - 1 + modalPhotos.length) % modalPhotos.length;
      renderModalPhoto();
    }

    function showNextPhoto() {
      if (modalPhotos.length === 0) {
        return;
      }

      modalIndex = (modalIndex + 1) % modalPhotos.length;
      renderModalPhoto();
    }

    function handleExit() {
      window.close();

      setTimeout(() => {
        const shouldReload = confirm("창을 닫을 수 없으면 페이지를 새로고침할까요?");

        if (shouldReload) {
          location.reload();
        }
      }, 100);
    }

    tabButtons.forEach((button) => {
      button.addEventListener("click", () => {
        switchTab(button.dataset.tab);
      });
    });

    postForm.addEventListener("submit", handleFormSubmit);

    adminLoginBtn.addEventListener("click", () => {
      const password = adminPasswordInput.value.trim();

      if (password !== ADMIN_PASSWORD) {
        alert("관리자 비밀번호가 틀렸습니다.");
        return;
      }

      isAdmin = true;
      adminPasswordInput.value = "";
      updateAdminSection();
    });

    adminLogoutBtn.addEventListener("click", () => {
      isAdmin = false;
      updateAdminSection();
    });

    modalCloseBtn.addEventListener("click", closePhotoModal);
    modalPrevBtn.addEventListener("click", showPrevPhoto);
    modalNextBtn.addEventListener("click", showNextPhoto);

    photoModal.addEventListener("click", (event) => {
      if (event.target === photoModal) {
        closePhotoModal();
      }
    });

    exitBtn.addEventListener("click", handleExit);

    onSnapshot(query(postsCollection, orderBy("createdAt", "desc")), (snapshot) => {
      posts.length = 0;

      snapshot.forEach((item) => {
        posts.push(normalizePost(item.data(), item.id));
      });

      updateListSection();
      updateAdminSection();
    }, (error) => {
      console.error("Firestore 읽기 실패:", error);
      alert("Firestore에서 데이터를 불러오지 못했습니다. 콘솔에서 오류를 확인해주세요.");
    });
  </script>
